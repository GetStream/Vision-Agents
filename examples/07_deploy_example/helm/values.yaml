replicaCount: 1

image:
  repository: vision-agent-deploy
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

# GPU configuration
gpu:
  enabled: false
  count: 1

# Resources - automatically adjusted when gpu.enabled=true
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi

# GPU resources (used when gpu.enabled=true)
gpuResources:
  limits:
    cpu: 16000m
    memory: 200Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 8000m
    memory: 100Gi
    nvidia.com/gpu: 1

# Application port (Vision Agents default: 8080)
containerPort: 8080

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Ingress configuration
ingress:
  enabled: true
  className: ""   # nginx, traefik, etc.
  host: ""        # e.g. agent.example.com
  annotations: {}
  tls: []
  # - secretName: agent-tls
  #   hosts:
  #     - agent.example.com

# Redis for horizontal scaling (multi-replica session registry)
redis:
  # Deploy Redis alongside the agent (for dev/testing)
  deploy:
    enabled: true
  # External Redis URL (for production — use managed Redis)
  # When redis.deploy.enabled=true and url is empty, auto-connects to the bundled Redis
  # When redis.deploy.enabled=false, set this to your managed Redis URL
  url: ""  # e.g. redis://redis:6379/0 or rediss://:auth@host:6380/0
  # Bitnami Redis chart overrides (only when redis.deploy.enabled=true)
  auth:
    enabled: false
  architecture: standalone

# Prometheus metrics scraping
metrics:
  enabled: true
  path: /metrics
  port: 8080
  # Additional labels for ServiceMonitor (e.g. to match Prometheus serviceMonitorSelector)
  additionalLabels: {}
  #   release: monitoring

# Grafana dashboard (requires grafana sidecar with dashboard provisioning)
grafana:
  enabled: true

# Persistent cache for uv packages (faster restarts)
cache:
  enabled: true
  size: 10Gi
  storageClass: ""

# API keys - set these or use existing secret
secrets:
  existingSecret: ""
  googleApiKey: ""
  elevenlabsApiKey: ""
  deepgramApiKey: ""
  streamApiKey: ""
  streamApiSecret: ""

# Use to schedule on specific node groups
nodeSelector: {}

tolerations: []
# GPU nodes often have taints, add toleration:
# - key: "nvidia.com/gpu"
#   operator: "Exists"
#   effect: "NoSchedule"

affinity: {}
