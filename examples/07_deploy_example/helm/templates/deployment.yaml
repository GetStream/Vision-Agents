apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vision-agent.fullname" . }}
  labels:
    {{- include "vision-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vision-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vision-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "vision-agent.secretName" . }}
          {{- if or .Values.redis.url .Values.redis.deploy.enabled }}
          env:
            - name: REDIS_URL
              value: {{ .Values.redis.url | default (printf "redis://%s-redis-master:6379/0" .Release.Name) | quote }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- if .Values.gpu.enabled }}
          resources:
            {{- toYaml .Values.gpuResources | nindent 12 }}
          {{- else }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.cache.enabled }}
          volumeMounts:
            - name: uv-cache
              mountPath: /root/.cache/uv
          {{- end }}
      {{- if .Values.cache.enabled }}
      volumes:
        - name: uv-cache
          persistentVolumeClaim:
            claimName: {{ include "vision-agent.fullname" . }}-uv-cache
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
