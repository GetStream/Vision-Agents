services:
  tencent-agent:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/app
      # Mask the host's .venv and .uv-cache so the linux container doesn't
      # overwrite macOS-arch binaries on the host bind mount.
      - /app/.venv
      - /app/.uv-cache
    env_file:
      - path: ../../.env
        required: false
    environment:
      - PYTHONUNBUFFERED=1
      # Forwarded from the host shell at `docker compose run` time:
      # TENCENT_TEST_ROOM_ID=<roomId-from-tencent-quick-demo>
      - TENCENT_TEST_ROOM_ID
      # Set TENCENT_LITEAV_DEBUG=1 to surface the C++ SDK's `[I][...]`
      # console logs (jitter buffer, watchdog, signal resolves). Off by
      # default; file logs at /root/.cache/python3/liteav/log are kept.
      - TENCENT_LITEAV_DEBUG
    command:
      - /bin/sh
      - -c
      - |
        uv sync --no-dev \
          --package vision-agents-plugins-tencent \
          --package vision-agents-plugins-gemini \
          --package vision-agents-plugins-elevenlabs \
          --package vision-agents-plugins-cartesia && \
        uv run --no-sync --package vision-agents-plugins-tencent \
          python plugins/tencent/example/tencent_edge_example.py run
